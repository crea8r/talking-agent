<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Talking Agent · One-to-One Voice Session</title>
    <link rel="stylesheet" href="/styles.css" />
    <script type="importmap">
      {
        "imports": {
          "three": "/vendor/three/build/three.module.js",
          "three/addons/": "/vendor/three/examples/jsm/",
          "@pixiv/three-vrm": "/vendor/@pixiv/three-vrm/three-vrm.module.js",
          "@pixiv/three-vrm-animation": "/vendor/@pixiv/three-vrm-animation/three-vrm-animation.module.js"
        }
      }
    </script>
  </head>
  <body>
    <main class="shell">
      <div class="floating-mode-switch">
        <nav class="screen-nav screen-nav--floating" role="tablist" aria-label="Primary surfaces">
          <button
            id="screen-tab-setup"
            class="screen-tab is-active"
            type="button"
            role="tab"
            aria-selected="true"
            aria-controls="screen-setup"
            data-screen-target="setup"
          >
            <span class="screen-tab-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
                <path d="M4 7h8"></path>
                <path d="M16 7h4"></path>
                <path d="M10 7a2 2 0 1 0 4 0 2 2 0 0 0-4 0Z"></path>
                <path d="M4 17h4"></path>
                <path d="M12 17h8"></path>
                <path d="M8 17a2 2 0 1 0 4 0 2 2 0 0 0-4 0Z"></path>
              </svg>
            </span>
            <span class="screen-tab-label">Setup</span>
          </button>
          <button
            id="screen-tab-call"
            class="screen-tab"
            type="button"
            role="tab"
            aria-selected="false"
            aria-controls="screen-call"
            data-screen-target="call"
          >
            <span class="screen-tab-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
                <path d="M8.7 4.8c.6-.6 1.5-.8 2.3-.4l2.1 1c.8.4 1.2 1.3 1 2.2l-.4 2a2 2 0 0 0 .6 1.8l1.3 1.3a2 2 0 0 0 1.8.6l2-.4c.9-.2 1.8.2 2.2 1l1 2.1c.4.8.2 1.7-.4 2.3l-1.3 1.3c-1.4 1.4-3.5 1.9-5.4 1.2a22 22 0 0 1-7-4.5 22 22 0 0 1-4.5-7c-.7-1.9-.2-4 1.2-5.4l1.3-1.3Z"></path>
              </svg>
            </span>
            <span class="screen-tab-label">Call</span>
          </button>
        </nav>
      </div>

      <section
        id="screen-setup"
        class="screen"
        data-screen="setup"
        role="tabpanel"
        aria-labelledby="screen-tab-setup"
      >
        <article class="panel stack-xl setup-panel">
          <section class="avatar-preview-card" aria-label="Avatar preview">
            <div id="setup-avatar-host" class="avatar-host">
              <section id="avatar-preview-shell" class="avatar-preview-shell">
                <div id="stage-shell" class="stage-shell">
                  <canvas id="agent-canvas" aria-label="Agent avatar stage"></canvas>
                  <div class="orb orb-a"></div>
                  <div class="orb orb-b"></div>
                </div>
              </section>
            </div>
          </section>

          <div class="setup-controls">
            <div class="setup-control">
              <div class="setup-control-head">
                <label for="bundled-model-select" class="setup-control-label">Character</label>
                <div class="setup-action-cluster">
                  <button
                    id="preview-character-animation"
                    class="setup-action-button"
                    type="button"
                    aria-label="Preview character animation"
                  >
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
                      <path d="M8 6v12l10-6-10-6Z" fill="currentColor" stroke="none"></path>
                    </svg>
                  </button>
                </div>
              </div>
              <select id="bundled-model-select" name="bundled-model-select"></select>
            </div>

            <div class="setup-control setup-control--voice">
              <div class="setup-control-head">
                <span class="setup-control-label">Voice</span>
                <div class="setup-action-cluster">
                  <button
                    id="preview-voice-sample"
                    class="setup-action-button"
                    type="button"
                    aria-label="Preview selected voice sample"
                  >
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
                      <path d="M5 15.5V8.5h3.2l4.8-3.7v14.4L8.2 15.5H5Z"></path>
                      <path d="M16 9.5c1.3.9 2 2.1 2 3.5s-.7 2.6-2 3.5"></path>
                      <path d="M18.8 7c2.1 1.6 3.2 3.6 3.2 6s-1.1 4.4-3.2 6"></path>
                    </svg>
                  </button>
                  <span
                    id="preview-voice-sample-timer"
                    class="setup-action-timer"
                    aria-live="polite"
                    hidden
                  >0s</span>
                </div>
              </div>
              <label for="voice-sample-file" class="voice-sample-picker" aria-live="polite">
                <span class="voice-sample-icon" aria-hidden="true">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
                    <path d="M12 16V7"></path>
                    <path d="M8.5 10.5 12 7l3.5 3.5"></path>
                    <path d="M5 17.5h14"></path>
                  </svg>
                </span>
                <span class="voice-sample-copy">
                  <strong id="voice-sample-file-name">Choose WAV</strong>
                  <span id="voice-sample-status" data-tone="danger">missing voice reference, a 3+s wav file</span>
                </span>
                <input
                  id="voice-sample-file"
                  class="voice-sample-input"
                  name="voice-sample-file"
                  type="file"
                  accept=".wav,audio/wav"
                />
              </label>
            </div>
          </div>

          <div hidden>
            <select id="stage-select" name="stage-select"></select>
            <select id="emote-select" name="emote-select"></select>
            <select id="gesture-select" name="gesture-select"></select>
          </div>
        </article>
      </section>

      <section
        id="screen-call"
        class="screen"
        data-screen="call"
        role="tabpanel"
        aria-labelledby="screen-tab-call"
        hidden
      >
        <article class="call-panel">
          <div id="call-layout" class="call-layout" data-history-visible="false">
            <div class="call-stage">
              <div id="call-avatar-host" class="avatar-host avatar-host--call" data-agent-online="false">
                <div id="call-empty-state" class="call-empty-state">
                  <div class="call-empty-visual" aria-hidden="true">
                    <span class="call-empty-ring"></span>
                    <span class="call-empty-icon">
                      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
                        <path d="M8.7 4.8c.6-.6 1.5-.8 2.3-.4l2.1 1c.8.4 1.2 1.3 1 2.2l-.4 2a2 2 0 0 0 .6 1.8l1.3 1.3a2 2 0 0 0 1.8.6l2-.4c.9-.2 1.8.2 2.2 1l1 2.1c.4.8.2 1.7-.4 2.3l-1.3 1.3c-1.4 1.4-3.5 1.9-5.4 1.2a22 22 0 0 1-7-4.5 22 22 0 0 1-4.5-7c-.7-1.9-.2-4 1.2-5.4l1.3-1.3Z"></path>
                      </svg>
                    </span>
                  </div>
                  <p id="call-empty-state-title" class="call-empty-title">Waiting</p>
                  <p id="call-empty-state-detail" class="call-empty-detail">Ready to start</p>
                </div>
                <div id="call-stage-loading" class="call-stage-loading" hidden>
                  <span class="call-stage-spinner" aria-hidden="true"></span>
                  <span class="call-stage-loading-label">Loading</span>
                </div>
              </div>
              <button
                id="call-mic-toggle"
                class="call-mic-toggle"
                type="button"
                data-state="muted"
                data-speaking="false"
                aria-label="Microphone muted"
                title="Microphone muted"
                disabled
              >
                <span class="call-mic-icon call-mic-icon--live" aria-hidden="true">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
                    <rect x="9" y="3" width="6" height="11" rx="3"></rect>
                    <path d="M6.5 11.5a5.5 5.5 0 0 0 11 0"></path>
                    <path d="M12 17v4"></path>
                    <path d="M8.5 21h7"></path>
                  </svg>
                </span>
                <span class="call-mic-icon call-mic-icon--muted" aria-hidden="true">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
                    <rect x="9" y="3" width="6" height="11" rx="3"></rect>
                    <path d="M6.5 11.5a5.5 5.5 0 0 0 8 4.8"></path>
                    <path d="M12 17v4"></path>
                    <path d="M8.5 21h7"></path>
                    <path d="M4 4l16 16"></path>
                  </svg>
                </span>
              </button>
              <section class="call-subtitle-overlay" aria-label="Live call subtitles">
                <div class="call-subtitle-bar">
                  <p id="call-subtitle-combined" class="call-subtitle-copy">Me: Waiting for you to start the call.
Agent: Agent is offline.</p>
                  <div class="call-subtitle-actions">
                    <span
                      id="call-thinking-timer"
                      class="call-thinking-timer"
                      aria-live="polite"
                      hidden
                    ></span>
                    <button
                      id="call-history-toggle"
                      class="call-history-toggle call-history-toggle--overlay"
                      type="button"
                      aria-label="Show call history"
                      title="Show call history"
                      hidden
                    >
                      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
                        <path d="M7 7h10"></path>
                        <path d="M7 12h10"></path>
                        <path d="M7 17h10"></path>
                      </svg>
                    </button>
                    <button
                      id="join-call"
                      class="primary call-button call-button--overlay"
                      type="button"
                      data-mode="start-call"
                      aria-label="Start Call"
                      title="Start Call"
                    >
                      <span class="call-button-icon call-button-icon--start" aria-hidden="true">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
                          <path d="M8.7 4.8c.6-.6 1.5-.8 2.3-.4l2.1 1c.8.4 1.2 1.3 1 2.2l-.4 2a2 2 0 0 0 .6 1.8l1.3 1.3a2 2 0 0 0 1.8.6l2-.4c.9-.2 1.8.2 2.2 1l1 2.1c.4.8.2 1.7-.4 2.3l-1.3 1.3c-1.4 1.4-3.5 1.9-5.4 1.2a22 22 0 0 1-7-4.5 22 22 0 0 1-4.5-7c-.7-1.9-.2-4 1.2-5.4l1.3-1.3Z"></path>
                        </svg>
                      </span>
                      <span class="call-button-icon call-button-icon--end" aria-hidden="true">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
                          <path d="M4 16.5c2.4-2.3 5-3.5 8-3.5s5.6 1.2 8 3.5"></path>
                          <path d="M9 15 4.5 19.5"></path>
                          <path d="M15 15 19.5 19.5"></path>
                        </svg>
                      </span>
                    </button>
                  </div>
                </div>
                <div class="call-compose">
                  <textarea
                    id="typed-input"
                    class="call-compose-input"
                    rows="1"
                    placeholder="Type to agent"
                  ></textarea>
                  <button
                    id="send-typed"
                    class="call-compose-send"
                    type="button"
                    aria-label="Send typed message"
                    title="Send typed message"
                  >
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
                      <path d="M4 12 20 4 14 20 11 13 4 12Z"></path>
                    </svg>
                  </button>
                </div>
              </section>
            </div>

            <aside id="call-history-panel" class="call-history" hidden>
              <div class="call-history-head">
                <span class="legend">History</span>
              </div>
              <ol id="call-history-list" class="turn-list call-history-list">
                <li class="empty-state">No turns yet.</li>
              </ol>
            </aside>
          </div>

        </article>
      </section>
    </main>

    <script type="module" src="/app.js"></script>
  </body>
</html>
